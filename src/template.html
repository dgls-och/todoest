<!-- @format -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todoest</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./index.js" defer></script>
  </head>
  <body>
    <div class="wrapper">
      <header>
        <h1>Todoest</h1>
      </header>
      <div id="todo-list">
        <div id="categories">
          <header class="list-header">
            <h2>Projects</h2>
            <button class="header-btn">New</button>
          </header>
          <div id="category-list"></div>
        </div>
        <div id="items">
          <header class="list-header">
            <h2>Tasks</h2>
            <button class="header-btn">New task</button>
          </header>
          <div id="task-list"></div>
        </div>
      </div>
    </div>
  </body>
</html>
